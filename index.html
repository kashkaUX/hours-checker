<!DOCTYPE html>
<html>
<head>
  <title>Store Hours Checker (Debug)</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<h2>Excel Debug 2 (Fixed Columns)</h2>

<input type="file" id="fileInput" />
<br><br>

<label>Start Date:</label>
<input type="date" id="startDate" />
<br><br>

<button onclick="runCheck()">Check</button>

<pre id="results"></pre>

<script>
window.runCheck = async function () {

  const file = document.getElementById("fileInput").files[0];
  const startDate = document.getElementById("startDate").value;

  if (!file || !startDate) {
    alert("Upload file and select date");
    return;
  }

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  // raw rows (no headers)
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const start = new Date(startDate);

  function formatDate(d) {
    return d.toLocaleDateString("en-GB");
  }

  function normalizeTime(t) {
  if (t === undefined || t === null || t === "") return "";

  // ✅ Excel numeric time (fraction of day)
  if (typeof t === "number") {
    const totalMinutes = Math.round(t * 24 * 60);
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;

    return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
  }

  // fallback (string)
  return t.toString().trim();
}

    return t;
  }

  // robust Excel date parser
  function parseExcelDate(value) {
    if (!value) return null;

    // Excel serial number
    if (typeof value === "number") {
      const d = XLSX.SSF.parse_date_code(value);
      return new Date(d.y, d.m - 1, d.d);
    }

    // String date (dd/mm/yyyy or dd/mm/yy)
    if (typeof value === "string") {
      const parts = value.split(/[\/\-]/);
      if (parts.length === 3) {
        let [day, month, year] = parts.map(Number);
        if (year < 100) year += 2000;
        return new Date(year, month - 1, day);
      }
    }

    // fallback (sometimes Excel already gives Date object)
    const d = new Date(value);
    if (!isNaN(d)) return d;

    return null;
  }

  let output = "";
  let matchesFound = 0;

  // loop through sheet rows
  for (let i = 1; i < rows.length; i++) {

    const row = rows[i];

    if (!row[2]) continue; // column C = date

    const excelDate = parseExcelDate(row[2]);

    console.log("RAW:", row[2], "→ PARSED:", excelDate);

    if (!excelDate) continue;

    // compare against 7-day window
    for (let j = 0; j < 7; j++) {

      let d = new Date(start);
      d.setDate(d.getDate() + j);

      const sameDate =
        excelDate.getDate() === d.getDate() &&
        excelDate.getMonth() === d.getMonth() &&
        excelDate.getFullYear() === d.getFullYear();

      if (!sameDate) continue;

      matchesFound++;

      const grafton =
        `${normalizeTime(row[3])}-${normalizeTime(row[4])}`;

      const dundrum =
        `${normalizeTime(row[5])}-${normalizeTime(row[6])}`;

      output += `${formatDate(d)}\n`;
      output += `  Grafton St: ${grafton}\n`;
      output += `  Dundrum:    ${dundrum}\n\n`;
    }
  }

  if (matchesFound === 0) {
    output = "⚠️ No matching rows found — Excel date format still not recognised";
  }

  document.getElementById("results").innerText = output;
};
</script>

</body>
</html>
