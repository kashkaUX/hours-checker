<!DOCTYPE html>
<html>
<head>
  <title>Store Hours Checker</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<h2>Store Hours Checker v2</h2>

<input type="file" id="fileInput" />
<br><br>

<label>Start Date:</label>
<input type="date" id="startDate" />
<br><br>

<button onclick="runCheck()">Check</button>

<pre id="results"></pre>

<script>
const PROXY = "https://fetch-hours-site.sankowskak.workers.dev/?url=";

window.runCheck = async function () {

  const file = document.getElementById("fileInput").files[0];
  const startDate = document.getElementById("startDate").value;

  if (!file || !startDate) {
    alert("Upload file and select date");
    return;
  }

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const start = new Date(startDate);

  function formatDate(d) {
    return d.toLocaleDateString("en-GB");
  }

  // ✅ Excel time fix
  function normalizeTime(t) {
    if (t === undefined || t === null || t === "") return "";

    if (typeof t === "number") {
      const totalMinutes = Math.round(t * 24 * 60);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
    }

    return t.toString().trim();
  }

  // ✅ Excel date fix
  function parseExcelDate(value) {
    if (!value) return null;

    if (typeof value === "number") {
      const d = XLSX.SSF.parse_date_code(value);
      return new Date(d.y, d.m - 1, d.d);
    }

    if (typeof value === "string") {
      const parts = value.split(/[\/\-]/);
      if (parts.length === 3) {
        let [day, month, year] = parts.map(Number);
        if (year < 100) year += 2000;
        return new Date(year, month - 1, day);
      }
    }

    const d = new Date(value);
    return isNaN(d) ? null : d;
  }

  // ✅ Site extractor (all months)
  function extract(html) {
    const match = html.match(/const\s+text\w+\s*=\s*`([\s\S]*?)`/);
    if (!match) return {};

    const monthMap = {
      January:0, February:1, March:2, April:3,
      May:4, June:5, July:6, August:7,
      September:8, October:9, November:10, December:11
    };

    let result = {};

    match[1].split("\n").forEach(line => {
      const [datePart, time] = line.split(" - ");
      if (!datePart || !time) return;

      const m = datePart.match(/(\d+)[a-z]{2}\s+(\w+)/i);
      if (!m) return;

      const day = parseInt(m[1]);
      const month = monthMap[m[2]];
      if (month === undefined) return;

      const d = new Date(2026, month, day);
      const key = formatDate(d);

      result[key] = time.trim();
    });

    return result;
  }

  async function fetchStore(url) {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const html = await res.text();
    return extract(html);
  }

  // 👉 Add more stores here later
  const stores = {
    "Grafton St": {
      url: "https://www.brownthomas.com/dublin-hours.html",
      openCol: 3,
      closeCol: 4
    },
    "Dundrum": {
      url: "https://www.brownthomas.com/dundrum-hours.html",
      openCol: 5,
      closeCol: 6
    }
  };

  let output = "";
  let checked = 0;

  for (let storeName in stores) {

    const store = stores[storeName];
    const siteData = await fetchStore(store.url);

    for (let i = 1; i < rows.length; i++) {

      const row = rows[i];
      if (!row[2]) continue;

      const excelDate = parseExcelDate(row[2]);
      if (!excelDate) continue;

      for (let j = 0; j < 7; j++) {

        let d = new Date(start);
        d.setDate(d.getDate() + j);

        const sameDate =
          excelDate.getDate() === d.getDate() &&
          excelDate.getMonth() === d.getMonth() &&
          excelDate.getFullYear() === d.getFullYear();

        if (!sameDate) continue;

        checked++;

        const dateStr = formatDate(d);

        const sheetTime =
          `${normalizeTime(row[store.openCol])}-${normalizeTime(row[store.closeCol])}`;

        const siteTime = siteData[dateStr];

        if (!siteTime) {
          output += `${dateStr} ${storeName} ❌ missing on site\n`;
        } else if (sheetTime !== siteTime) {
          output += `${dateStr} ${storeName} ❌ sheet: ${sheetTime} | site: ${siteTime}\n`;
        }
      }
    }
  }

  if (checked === 0) {
    output = "⚠️ No matching rows found";
  } else if (!output) {
    output = "✅ No differences";
  }

  document.getElementById("results").innerText = output;
};
</script>

</body>
</html>
