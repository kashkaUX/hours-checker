<!DOCTYPE html>
<html>
<head>
  <title>Store Hours Checker</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    .diff { color: red; }
    .ok { color: green; }
  </style>
</head>
<body>

<h2>Store Hours Checker</h2>

<input type="file" id="fileInput" />
<br><br>

<label>Start Date:</label>
<input type="date" id="startDate" />
<br><br>

<button onclick="runCheck()">Check</button>

<pre id="results"></pre>

<script>
window.runCheck = async function () {

  const file = document.getElementById("fileInput").files[0];
  const startDate = document.getElementById("startDate").value;

  if (!file || !startDate) {
    alert("Upload file and select date");
    return;
  }

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  // 👉 raw rows (no headers)
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const start = new Date(startDate);

  function formatDate(d) {
    return d.toLocaleDateString("en-GB");
  }

  function normalizeTime(t) {
    if (!t) return "";
    t = t.toString().trim();

    const m = t.match(/(\d+):(\d+)(?::\d+)?\s*(AM|PM)/i);
    if (m) {
      let h = parseInt(m[1]);
      let min = m[2];
      const p = m[3].toUpperCase();

      if (p === "PM" && h !== 12) h += 12;
      if (p === "AM" && h === 12) h = 0;

      return `${String(h).padStart(2, "0")}:${min}`;
    }

    return t;
  }

  let output = "";

  // skip header row → start at 1
  for (let i = 1; i < rows.length; i++) {

    const row = rows[i];

    if (!row[2]) continue; // no date

    let excelDate = new Date(row[2]);
    const excelKey = formatDate(excelDate);

    for (let j = 0; j < 7; j++) {

      let d = new Date(start);
      d.setDate(d.getDate() + j);

      const targetDate = formatDate(d);

      if (excelKey !== targetDate) continue;

      const grafton =
        `${normalizeTime(row[3])}-${normalizeTime(row[4])}`;

      const dundrum =
        `${normalizeTime(row[5])}-${normalizeTime(row[6])}`;

      output += `${targetDate}\n`;
      output += `  Grafton St: ${grafton}\n`;
      output += `  Dundrum:    ${dundrum}\n\n`;
    }
  }

  if (!output) {
    output = "⚠️ No matching rows found (date mismatch still)";
  }

  document.getElementById("results").innerText = output;
};
</script>

</body>
</html>
