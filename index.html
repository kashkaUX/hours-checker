<!DOCTYPE html>
<html>
<head>
  <title>Store Hours Checker</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    .diff { color: red; }
    .ok { color: green; }
  </style>
</head>
<body>

<h2>Store Hours Checker</h2>

<input type="file" id="fileInput" />
<br><br>

<label>Start Date:</label>
<input type="date" id="startDate" />
<br><br>

<button onclick="runCheck()">Check</button>

<pre id="results"></pre>

<script>
const PROXY = "https://fetch-hours-site.sankowskak.workers.dev/?url=";

window.runCheck = async function () {

  const file = document.getElementById("fileInput").files[0];
  const startDate = document.getElementById("startDate").value;

  if (!file || !startDate) {
    alert("Upload file and select date");
    return;
  }

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  const start = new Date(startDate);

  function formatDate(d) {
    return d.toLocaleDateString("en-GB");
  }

  function normalizeTime(t) {
    if (!t) return "";
    t = t.toString().trim();

    const m = t.match(/(\d+):(\d+)(?::\d+)?\s*(AM|PM)/i);
    if (m) {
      let h = parseInt(m[1]);
      let min = m[2];
      const p = m[3].toUpperCase();

      if (p === "PM" && h !== 12) h += 12;
      if (p === "AM" && h === 12) h = 0;

      return `${String(h).padStart(2, "0")}:${min}`;
    }

    return t;
  }

  // ✅ FIXED extractor (all months)
  function extract(html) {
    const match = html.match(/const\s+text\w+\s*=\s*`([\s\S]*?)`/);
    if (!match) return {};

    const monthMap = {
      January:0, February:1, March:2, April:3,
      May:4, June:5, July:6, August:7,
      September:8, October:9, November:10, December:11
    };

    let result = {};

    match[1].split("\n").forEach(line => {
      const [datePart, time] = line.split(" - ");
      if (!datePart || !time) return;

      const m = datePart.match(/(\d+)[a-z]{2}\s+(\w+)/i);
      if (!m) return;

      const day = parseInt(m[1]);
      const month = monthMap[m[2]];
      if (month === undefined) return;

      const d = new Date(2026, month, day);
      const key = d.toLocaleDateString("en-GB");

      result[key] = time.trim();
    });

    return result;
  }

  async function fetchStore(url) {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const html = await res.text();

    // debug (optional)
    console.log("HTML snippet:", html.slice(0, 300));

    return extract(html);
  }

  // ✅ Add more stores here later
  const urls = {
    "Grafton St": "https://www.brownthomas.com/dublin-hours.html"
  };

  let output = "";
  let checked = 0;

  for (let store in urls) {

    const site = await fetchStore(urls[store]);
    console.log("SITE DATA:", site);

    for (let i = 0; i < 7; i++) {

      let d = new Date(start);
      d.setDate(d.getDate() + i);

      const date = formatDate(d);

      // ✅ robust Excel date match
      const row = json.find(r => {

        let excelDate;

        if (typeof r["Date"] === "number") {
          const parsed = XLSX.SSF.parse_date_code(r["Date"]);
          excelDate = new Date(parsed.y, parsed.m - 1, parsed.d);
        } else {
          excelDate = new Date(r["Date"]);
        }

        return excelDate.getDate() === d.getDate() &&
               excelDate.getMonth() === d.getMonth() &&
               excelDate.getFullYear() === d.getFullYear();
      });

      if (!row) continue;

      checked++;

      const sheetTime =
        `${normalizeTime(row[store + " Open"])}-${normalizeTime(row[store + " Close"])}`;

      const siteTime = site[date];

      if (!siteTime) {
        output += `${date} ${store} ❌ missing on site\n`;
      } else if (sheetTime !== siteTime) {
        output += `${date} ${store} ❌ sheet: ${sheetTime} | site: ${siteTime}\n`;
      }
    }
  }

  if (checked === 0) {
    output = "⚠️ No matching rows found — check Excel date format";
  } else if (!output) {
    output = "✅ No differences";
  }

  document.getElementById("results").innerText = output;
};
</script>

</body>
</html>
