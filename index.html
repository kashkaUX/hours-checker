<!DOCTYPE html>
<html>
<head>
  <title>Store Hours Checker</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 8px; }
    .diff { background: #ffdddd; }
    .missing { background: #fff3cd; }
  </style>
</head>
<body>

<h2>Store Hours Checker</h2>

<input type="file" id="fileInput" />
<br><br>

<label>Start Date:</label>
<input type="date" id="startDate" />
<br><br>

<button onclick="runCheck()">Check</button>

<div id="results"></div>

<script>
const PROXY = "https://fetch-hours-site.sankowskak.workers.dev/?url=";

window.runCheck = async function () {

  const file = document.getElementById("fileInput").files[0];
  const startDate = document.getElementById("startDate").value;

  if (!file || !startDate) {
    alert("Upload file and select date");
    return;
  }

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  const start = new Date(startDate);

  function formatDate(d) {
    return d.toLocaleDateString("en-GB");
  }

  function normalizeTime(t) {
    if (!t) return "";
    t = t.toString().trim();

    const m = t.match(/(\d+):(\d+)(?::\d+)?\s*(AM|PM)/i);
    if (m) {
      let h = parseInt(m[1]);
      let min = m[2];
      const p = m[3].toUpperCase();

      if (p === "PM" && h !== 12) h += 12;
      if (p === "AM" && h === 12) h = 0;

      return `${String(h).padStart(2, "0")}:${min}`;
    }

    return t;
  }

  function extract(html) {
    const match = html.match(/const\s+text\w+\s*=\s*`([\s\S]*?)`/);
    if (!match) return {};

    let result = {};

    match[1].split("\n").forEach(line => {
      const [datePart, time] = line.split(" - ");
      if (!datePart || !time) return;

      const m = datePart.match(/(\d+)[a-z]{2}\s+(\w+)/i);
      if (!m) return;

      const day = parseInt(m[1]);
      const monthMap = { April: 3 };

      const d = new Date(2026, monthMap[m[2]], day);
      result[formatDate(d)] = time.trim();
    });

    return result;
  }

  async function fetchStore(url) {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const html = await res.text();
    return extract(html);
  }

  const urls = {
    "Grafton St": "https://www.brownthomas.com/dublin-hours.html"
  };

  let output = "";

  for (let store in urls) {

    const site = await fetchStore(urls[store]);

    for (let i = 0; i < 7; i++) {
      let d = new Date(start);
      d.setDate(d.getDate() + i);

      const date = formatDate(d);

      console.log("Looking for:", date);
      console.log("Available dates:", json.map(r => r["Date"]));

  const row = json.find(r => {
  let excelDate;

  if (typeof r["Date"] === "number") {
    excelDate = XLSX.SSF.parse_date_code(r["Date"]);
    excelDate = new Date(excelDate.y, excelDate.m - 1, excelDate.d);
  } else {
    excelDate = new Date(r["Date"]);
  }

  const formatted = excelDate.toLocaleDateString("en-GB");
  return formatted === date;
});
      if (!row) continue;

      const sheetTime = `${normalizeTime(row[store + " Open"])}-${normalizeTime(row[store + " Close"])}`;
      const siteTime = site[date];

      if (!siteTime) {
        output += `${date} ${store} ❌ missing on site\n`;
      } else if (sheetTime !== siteTime) {
        output += `${date} ${store} ❌ sheet: ${sheetTime} | site: ${siteTime}\n`;
      }
    }
  }

  document.getElementById("results").innerText = output || "✅ No differences";
};
</script>

</body>
</html>
